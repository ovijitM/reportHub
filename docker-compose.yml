version: '3.8'

services:
  # Main Application Service (Serves API + Frontend assets together)
  app:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: allen-pharma-app
    restart: always
    environment:
      - PORT=${PORT:-5000}
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - LOCK_WINDOW_DAYS=${LOCK_WINDOW_DAYS:-7}
      - DEFAULT_ADMIN_PHONE=${DEFAULT_ADMIN_PHONE}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - DEFAULT_ADMIN_NAME=${DEFAULT_ADMIN_NAME}
      - REDIS_URL=${REDIS_URL}
    networks:
      - app-network
      # Connects to the host Traefik network
      - web
    
    # Exposes port for local running (uncomment 'ports' if running without a reverse proxy)
    # ports:
    #   - "5000:5000"

    labels:
      - "traefik.enable=true"
      # REPLACE fieldsheets.yourdomain.com with your actual domain
      - "traefik.http.routers.allen-pharma.rule=Host(`stuffreport.rakibroki.tech`)"
      - "traefik.http.routers.allen-pharma.entrypoints=websecure"
      - "traefik.http.routers.allen-pharma.tls=true"
      # Uses the VPS's configured Let's Encrypt resolver (change name if necessary)
      - "traefik.http.routers.allen-pharma.tls.certresolver=myresolver"
      - "traefik.http.services.allen-pharma.loadbalancer.server.port=5000"

networks:
  app-network:
    driver: bridge
  
  # External network where Traefik proxy resides.
  # Ensure you create it first using 'docker network create web' if testing locally.
  web:
    external: true
