version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: allen-pharma-backend
    restart: always
    environment:
      - PORT=${PORT:-5000}
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - LOCK_WINDOW_DAYS=${LOCK_WINDOW_DAYS:-7}
      - DEFAULT_ADMIN_PHONE=${DEFAULT_ADMIN_PHONE}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - DEFAULT_ADMIN_NAME=${DEFAULT_ADMIN_NAME}
      - REDIS_URL=${REDIS_URL}
    networks:
      - app-network
      - web
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.allen-pharma-backend.rule=Host(`stuffreport.rakibroki.tech`) && PathPrefix(`/api`)"
      - "traefik.http.routers.allen-pharma-backend.entrypoints=websecure"
      - "traefik.http.routers.allen-pharma-backend.tls=true"
      - "traefik.http.routers.allen-pharma-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.allen-pharma-backend.loadbalancer.server.port=5000"

  # Frontend Static Asset Service (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: allen-pharma-frontend
    restart: always
    networks:
      - app-network
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.allen-pharma-frontend.rule=Host(`stuffreport.rakibroki.tech`)"
      - "traefik.http.routers.allen-pharma-frontend.entrypoints=websecure"
      - "traefik.http.routers.allen-pharma-frontend.tls=true"
      - "traefik.http.routers.allen-pharma-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.allen-pharma-frontend.loadbalancer.server.port=80"

  # Internal Redis Cache (Private, no public ports exposed)
  redis:
    image: redis:alpine
    container_name: allen-pharma-redis
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-123456}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
  
  # External network where Traefik proxy resides.
  # Ensure you create it first using 'docker network create web' if testing locally.
  web:
    external: true
